name: NADIA — Manual Discovery

# Triggered when a manual-discovery issue is opened.
# The issue template auto-applies the 'manual-discovery' label.
#
# NADIA processes the user-specified accessions, creates Synapse projects for
# qualifying datasets, and files study-review issues for data manager review.
# This issue remains open until the agent run completes, then is closed
# with a summary comment.

on:
  issues:
    types: [opened]

jobs:
  discover:
    # Only run for issues with the manual-discovery label
    if: contains(github.event.issue.labels.*.name, 'manual-discovery')
    runs-on: ubuntu-latest
    timeout-minutes: 180

    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: React to issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              content: 'eyes',
            });

      - name: Post start comment
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `NADIA is processing these accessions. [View run logs](${runUrl})`,
            });

      - name: Set up Node.js (for Claude Code CLI)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: lib/requirements.txt

      - name: Install Python dependencies
        run: pip install -r lib/requirements.txt

      - name: Install Claude Code CLI
        run: |
          npm install -g @anthropic-ai/claude-code
          echo "$(npm root -g)/../bin" >> "$GITHUB_PATH"

      - name: Prepare discovery prompt
        run: python3 scripts/nadia_manual_discovery_prep.py
        env:
          NADIA_ISSUE_NUMBER: ${{ github.event.issue.number }}
          NADIA_ISSUE_BODY: ${{ github.event.issue.body }}
          NADIA_WORKSPACE_DIR: /tmp/nf_agent
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Run NADIA
        run: |
          claude \
            --permission-mode bypassPermissions \
            --output-format stream-json \
            --verbose \
            --max-turns 80 \
            --add-dir "${{ github.workspace }}" \
            -p "$(cat /tmp/nf_agent/nadia_manual_prompt.md)"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SYNAPSE_AUTH_TOKEN: ${{ secrets.SYNAPSE_AUTH_TOKEN }}
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          STATE_PROJECT_ID: ${{ vars.STATE_PROJECT_ID }}
          AGENT_REPO_ROOT: ${{ github.workspace }}

      - name: Close issue on success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
              state_reason: 'completed',
            });

      - name: Close issue and post failure comment
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                '## ❌ Manual Discovery Run Failed',
                '',
                `The NADIA agent run encountered an error. [View logs](${runUrl})`,
                '',
                'Any Synapse projects created before the failure will still have study-review issues filed.',
                'You can re-open this issue or file a new one to retry the remaining accessions.',
              ].join('\n'),
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
              state_reason: 'not_planned',
            });
