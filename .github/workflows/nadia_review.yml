name: NADIA — Handle Review Commands

# Triggered when a data manager posts a /nadia command in a study-review issue comment.
#
# Supported commands:
#   /nadia status              — check current annotation status (code-only)
#   /nadia fix: <description>  — run Claude Code to apply the described fix

on:
  issue_comment:
    types: [created]

jobs:
  dispatch:
    # Only act on study-review issues (not PRs) with a /nadia command
    if: |
      !github.event.issue.pull_request &&
      contains(github.event.issue.labels.*.name, 'study-review') &&
      startsWith(github.event.comment.body, '/nadia')
    runs-on: ubuntu-latest
    timeout-minutes: 90

    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Parse command
        id: parse
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const body = context.payload.comment.body.trim();
            if (body.startsWith('/nadia fix:')) {
              core.setOutput('command', 'fix');
              core.setOutput('args', body.replace('/nadia fix:', '').trim());
            } else if (body.trim() === '/nadia status') {
              core.setOutput('command', 'status');
              core.setOutput('args', '');
            } else {
              core.setOutput('command', 'unknown');
              core.setOutput('args', body);
            }

      - name: React to comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'eyes',
            });

      # ── /nadia status ───────────────────────────────────────────────────────
      - name: Set up Python (for status check)
        if: steps.parse.outputs.command == 'status'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: lib/requirements.txt

      - name: Install Python deps (for status check)
        if: steps.parse.outputs.command == 'status'
        run: pip install -r lib/requirements.txt

      - name: Run status check
        if: steps.parse.outputs.command == 'status'
        run: |
          python scripts/nadia_status.py \
            --issue-number ${{ github.event.issue.number }}
        env:
          SYNAPSE_AUTH_TOKEN: ${{ secrets.SYNAPSE_AUTH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          STATE_PROJECT_ID: ${{ vars.STATE_PROJECT_ID }}
          AGENT_REPO_ROOT: ${{ github.workspace }}

      # ── /nadia fix: <description> ───────────────────────────────────────────
      - name: Set up Node.js (for Claude Code)
        if: steps.parse.outputs.command == 'fix'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Python (for fix)
        if: steps.parse.outputs.command == 'fix'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: lib/requirements.txt

      - name: Install Python deps (for fix)
        if: steps.parse.outputs.command == 'fix'
        run: pip install -r lib/requirements.txt

      - name: Install Claude Code CLI
        if: steps.parse.outputs.command == 'fix'
        run: |
          npm install -g @anthropic-ai/claude-code
          # Ensure npm global bin is on PATH for subsequent steps
          echo "$(npm root -g)/../bin" >> "$GITHUB_PATH"

      - name: Run Claude Code fix
        if: steps.parse.outputs.command == 'fix'
        env:
          # Pass user-controlled values through env vars to avoid shell injection
          NADIA_ISSUE_NUMBER: ${{ github.event.issue.number }}
          NADIA_FIX_DESCRIPTION: ${{ steps.parse.outputs.args }}
          NADIA_ISSUE_BODY: ${{ github.event.issue.body }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SYNAPSE_AUTH_TOKEN: ${{ secrets.SYNAPSE_AUTH_TOKEN }}
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          STATE_PROJECT_ID: ${{ vars.STATE_PROJECT_ID }}
          AGENT_REPO_ROOT: ${{ github.workspace }}
        run: |
          # Extract Synapse project ID safely via Python reading env var
          SYNAPSE_ID=$(python3 - <<'PYEOF'
import re, os
body = os.environ.get('NADIA_ISSUE_BODY', '')
m = re.search(r'"synapse_project_id":\s*"(syn\d+)"', body)
print(m.group(1) if m else '')
PYEOF
)
          if [ -z "$SYNAPSE_ID" ]; then
            echo "Could not extract Synapse project ID from issue body" >&2
            exit 1
          fi

          WORKSPACE_DIR=$(python3 -c "import yaml; cfg=yaml.safe_load(open('config/settings.yaml')); print(cfg['agent']['workspace_dir'])")
          mkdir -p "${WORKSPACE_DIR}"

          # Write prompt to a file to avoid any shell quoting issues
          python3 - <<PYEOF
import os
issue_number    = os.environ['NADIA_ISSUE_NUMBER']
fix_description = os.environ['NADIA_FIX_DESCRIPTION']
synapse_id      = '${SYNAPSE_ID}'
workspace_dir   = '${WORKSPACE_DIR}'
prompt = f"""A data manager has requested a fix to a NADIA Synapse project via GitHub issue #{issue_number}.

Synapse project: {synapse_id}
Fix requested: {fix_description}

Steps:
1. Read CLAUDE.md for safety rules and context.
2. Check the current state of the project annotations in Synapse (read project annotations, sample a few files, check dataset entities).
3. Apply the requested fix (update annotations, rename entities, etc. as needed). Follow all NADIA safety rules.
4. Verify the fix was applied correctly.
5. Post a GitHub comment on issue #{issue_number} summarising what was changed. Use scripts/github_issue.py post_issue_comment(), or POST directly to the GitHub API.

Work in {workspace_dir}. Do not modify CLAUDE.md, lib/, config/, or prompts/.
"""
with open(workspace_dir + '/nadia_fix_prompt.md', 'w') as f:
    f.write(prompt)
print(prompt[:200])
PYEOF

          claude \
            --permission-mode bypassPermissions \
            --output-format stream-json \
            --verbose \
            --max-turns 40 \
            --add-dir "${{ github.workspace }}" \
            -p "$(cat ${WORKSPACE_DIR}/nadia_fix_prompt.md)"

      # ── Unknown command ─────────────────────────────────────────────────────
      - name: Respond to unknown command
        if: steps.parse.outputs.command == 'unknown'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                '> Unknown NADIA command.',
                '',
                'Supported commands:',
                '- `/nadia status` — check current annotation status',
                '- `/nadia fix: <description>` — request an annotation fix',
                '',
                'To approve and provision, apply the `approved` label to this issue.',
              ].join('\n'),
            });

      - name: Post failure comment
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `The NADIA command handler failed. [View logs](${runUrl})`,
            });
