name: NF Data Contributor — Daily Run

on:
  schedule:
    - cron: '0 2 * * *'   # 2:00 AM UTC daily
  workflow_dispatch:       # Allow manual trigger
    inputs:
      lookback_days:
        description: 'Lookback window in days for discovery (default: 2). Ignored if seed_id is set.'
        required: false
        default: '2'
      seed_id:
        description: 'PMID or dataset accession to process directly, skipping discovery (e.g. 12345678 or GSE123456 or PXD012345). Leave blank for normal discovery run.'
        required: false
        default: ''

jobs:
  contribute:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js (for Claude Code CLI)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: lib/requirements.txt

      - name: Install Python dependencies
        run: pip install -r lib/requirements.txt

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Prepare task prompt
        run: |
          TODAY=$(date -u +%Y-%m-%d)

          # Determine lookback date
          LOOKBACK_DAYS="${{ github.event.inputs.lookback_days || '2' }}"
          LOOKBACK_DATE=$(date -u -d "${LOOKBACK_DAYS} days ago" +%Y-%m-%d 2>/dev/null || \
                          date -u -v-${LOOKBACK_DAYS}d +%Y-%m-%d)

          SEED_ID="${{ github.event.inputs.seed_id }}"

          mkdir -p /tmp/nf_agent

          # Inject dates and optional seed ID into the task template
          sed \
            -e "s/{{TODAY}}/${TODAY}/g" \
            -e "s/{{LOOKBACK_DATE}}/${LOOKBACK_DATE}/g" \
            -e "s/{{SEED_ID}}/${SEED_ID}/g" \
            prompts/daily_task_template.md > /tmp/nf_agent/daily_task.md

          echo "TODAY=${TODAY}" >> "$GITHUB_ENV"
          echo "LOOKBACK_DATE=${LOOKBACK_DATE}" >> "$GITHUB_ENV"
          echo "SEED_ID=${SEED_ID}" >> "$GITHUB_ENV"
          if [ -n "${SEED_ID}" ]; then
            echo "Task prompt prepared: direct processing of ${SEED_ID}"
          else
            echo "Task prompt prepared: discovery run since ${LOOKBACK_DATE}"
          fi

      - name: Run NF Data Contributor Agent
        run: |
          claude \
            --permission-mode bypassPermissions \
            --output-format stream-json \
            --verbose \
            --max-turns 80 \
            --add-dir "${{ github.workspace }}" \
            -p "$(cat /tmp/nf_agent/daily_task.md)"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SYNAPSE_AUTH_TOKEN: ${{ secrets.SYNAPSE_AUTH_TOKEN }}
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          STATE_PROJECT_ID: ${{ vars.STATE_PROJECT_ID }}
          # Provide repo root so agent scripts can find lib/
          AGENT_REPO_ROOT: ${{ github.workspace }}

      - name: Upload agent artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: agent-debug-${{ env.TODAY }}
          path: /tmp/nf_agent/
          retention-days: 14

      - name: Open GitHub Issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const today = process.env.TODAY || new Date().toISOString().slice(0,10);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Agent Failure] Daily run failed on ${today}`,
              body: [
                '## NF Data Contributor Agent — Run Failure',
                '',
                `**Date:** ${today}`,
                `**Run:** ${runUrl}`,
                '',
                'The daily run failed. Check the run logs and the uploaded `/tmp/nf_agent/` artifact for debug information.',
                '',
                'Common causes:',
                '- Synapse auth token expired',
                '- NCBI rate limit exceeded',
                '- Claude API error',
                '- `STATE_PROJECT_ID` repo variable not set',
              ].join('\n'),
              labels: ['agent-failure', 'automated'],
            });
