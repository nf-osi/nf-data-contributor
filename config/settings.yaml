# Data Contributor Agent — Runtime Settings
# Copy this file and fill in values for your disease domain / organization.

agent:
  name: "NADIA"
  description: "Notable Asset Discovery, Indexing, and Annotation — autonomous data curation for the NF Data Portal"
  version: "1.0.0"
  # Working directory for generated scripts and intermediate files
  workspace_dir: "/tmp/nf_agent"
  # Prefix for Synapse state table names: {prefix}_ProcessedStudies, {prefix}_RunLog
  state_table_prefix: "NF_DataContributor"
  # Name of the Synapse project that holds agent state tables
  state_project_name: "NF DataContributor Agent State"
  # Contact email used in API User-Agent strings and Entrez requests
  contact_email: "nf-data-contributor@sagebionetworks.org"
  # Synapse project ID for the agent's own state tables
  # Set to null on first run; the agent will create one and log the ID
  state_project_id: null

relevance:
  model: "claude-sonnet-4-6"
  threshold: 0.70          # Minimum relevance score (0.0–1.0)
  require_primary_data: true
  min_sample_count: 3      # null = no minimum
  allowed_access_types:    # Studies must be at least one of these
    - open
    - controlled

discovery:
  # How many calendar days back to search on the very first run
  initial_lookback_days: 1825  # 5 years
  # Per-connector max results per run (guard against runaway queries)
  max_results_per_connector: 50

deduplication:
  # Synapse table IDs for the live target portal — set for your portal instance
  studies_table_id: "syn52694652"        # MaterializedView — read-only, fed by studies_source_view_id
  studies_source_view_id: "syn52677631"  # ProjectView — add NADIA project IDs here to surface in portal
  files_table_id: "syn16858331"          # Files FileView — scopeIds are numeric (no 'syn' prefix)
  long_text_table_id: "syn16787123"      # Study long-text (summary, accessRequirements, acknowledgementStatements)
  publications_table_id: "syn16857542"   # Portal publications table
  dataset_collection_id: "syn50913342"   # Portal Dataset Collection — DatasetCollection entity
  # datasets_table_id "syn16859580" removed — entity does not exist (404)
  # TF-IDF cosine similarity threshold for fuzzy title matching
  fuzzy_title_threshold: 0.85

synapse:
  # Folder where pending-review projects are created.
  # Set to a Synapse project/folder ID, or null to create top-level projects.
  pending_review_parent_id: null
  # Project name template: EXT_{Repository}_{AccessionID}
  project_name_template: "EXT_{repository}_{accession_id}"
  resource_status: "pendingReview"
  # Principal ID of the data manager team that receives curator permissions on new projects
  # Find this in Synapse: Teams → your data manager team → team ID in the URL
  team_id: "3378999"
  schema:
    # Prefix prepended to template names to form a Synapse JSON Schema URI
    # e.g. "org.synapse.nf-" + "scrnaseqtemplate" → "org.synapse.nf-scrnaseqtemplate"
    uri_prefix: "org.synapse.nf-"
    # GitHub API URL listing available schema templates as JSON files
    metadata_dictionary_url: "https://api.github.com/repos/nf-osi/nf-metadata-dictionary/contents/registered-json-schemas"

annotations:
  # Portal-controlled vocabulary for disease focus annotation.
  # Replace with valid values from your portal's annotation dictionary.
  disease_focus_values:
    - "Neurofibromatosis type 1"
    - "Neurofibromatosis type 2"
    - "Schwannomatosis"
    - "MPNST"
  # Portal-controlled vocabulary for disease manifestation annotation.
  manifestation_values:
    - "MPNST"
    - "Plexiform Neurofibroma"
    - "Low-Grade Glioma NOS"
    - "Behavioral"
    - "Cognition"
    - "Memory"
    - "Pain"

curation_checklist:
  # Fields that must be set on the Synapse Project entity.
  # These are the annotation keys your portal's studies table expects.
  # Replace with the field names from your portal's metadata dictionary.
  required_project_annotations:
    - studyName           # expected: full publication title
    - studyStatus         # expected: Completed (for published studies)
    - dataStatus          # expected: Available
    - diseaseFocus        # controlled vocabulary — see annotations.disease_focus_values
    - manifestation       # controlled vocabulary — see annotations.manifestation_values
    - dataType            # controlled vocabulary — assay category
    - studyLeads          # first + last/corresponding author (from PubMed, not repository submitter)
    - institutions        # author affiliations (max 500 chars total)
    - fundingAgency       # from PubMed GrantList; fallback: "Not Applicable (External Study)"
    - resourceStatus      # expected: pendingReview
    - alternateDataRepository  # list of prefix:accession strings

  # NOTE: File-level annotation fields are NOT listed here — they are determined at runtime
  # by calling fetch_schema_properties(schema_uri) on the bound JSON schema.
  # The schema is the authoritative source for what fields exist on File entities,
  # what values are valid, and which fields apply conditionally (e.g. model organism fields,
  # antibody assay fields). Do not maintain a parallel field list here.

  # Fields that must be set as annotations on each Dataset entity.
  required_dataset_annotations:
    - contentType         # expected: dataset
    - externalAccessionID
    - externalRepository
    - resourceStatus      # expected: pendingReview
    - study               # project name
    - studyId             # Synapse project ID

  # Schema properties to include as columns in each Dataset entity's columnIds list.
  # This drives what columns appear in the Datasets tab for this portal.
  # Add or remove fields to match the schema properties your portal uses.
  dataset_column_fields:
    - study
    - assay
    - species
    - tumorType
    - diagnosis
    - fileFormat
    - resourceType
    - externalAccessionID
    - externalRepository
    - specimenID
    - individualID
    - dataSubtype
    - platform
    - libraryPreparationMethod
    - studyId
    - dataType
    - modelSystemName
    - assayTarget
    - sex
    - age
    - ageUnit
    - organ

notifications:
  github:
    enabled: true
    # GitHub org/team to mention on new study review issues (gets notified)
    # Format: org/team-slug — must be a team within the repo's org
    team_mention: "nf-osi/dcc-team"
    # Labels automatically applied to new study-review issues
    # 'approved' label triggers the provision_study.yml workflow
    labels:
      new_study: ["study-review", "automated"]
      dataset_added: ["study-review", "dataset-added", "automated"]

connectors:
  pubmed_geo:
    enabled: true
  sra:
    enabled: true
  dbgap:
    enabled: true
  zenodo:
    enabled: true
  figshare:
    enabled: true
  osf:
    enabled: true
  arrayexpress:
    enabled: true
  ega:
    enabled: true
  pride:
    enabled: true
  metabolights:
    enabled: true
  pdc:
    enabled: true
  datacite:
    enabled: true
    # Catches institutional repos (Science Data Bank, TIB, IFJ PAN, CORA, Dryad, etc.)
    # via a single API: https://api.datacite.org/dois?query={term}&resource-type-id=dataset
  massive:
    enabled: true
    # Proteomics datasets not already found via PRIDE
  nci_gdc:
    enabled: true
    # TCGA/NCI controlled-access cancer genomics; filter by disease_type or primary_site
  cell_image_library:
    enabled: true
    # Microscopy image datasets: https://cellimagelibrary.org/api/search?term={term}

logging:
  level: "INFO"
  json: true
