# Data Contributor Agent — Runtime Settings
# Copy this file and fill in values for your disease domain / organization.

agent:
  name: "NADIA"
  description: "Network-Agnostic Dataset Ingestion Agent — autonomous data curation for the NF Data Portal"
  version: "1.0.0"
  # Working directory for generated scripts and intermediate files
  workspace_dir: "/tmp/nf_agent"
  # Prefix for Synapse state table names: {prefix}_ProcessedStudies, {prefix}_RunLog
  state_table_prefix: "NF_DataContributor"
  # Name of the Synapse project that holds agent state tables
  state_project_name: "NF DataContributor Agent State"
  # Contact email used in API User-Agent strings and Entrez requests
  contact_email: "nf-data-contributor@sagebionetworks.org"
  # Synapse project ID for the agent's own state tables
  # Set to null on first run; the agent will create one and log the ID
  state_project_id: null

relevance:
  model: "claude-sonnet-4-6"
  threshold: 0.70          # Minimum relevance score (0.0–1.0)
  require_primary_data: true
  min_sample_count: 3      # null = no minimum
  allowed_access_types:    # Studies must be at least one of these
    - open
    - controlled

discovery:
  # How many calendar days back to search on the very first run
  initial_lookback_days: 1825  # 5 years
  # Per-connector max results per run (guard against runaway queries)
  max_results_per_connector: 50

deduplication:
  # Synapse table IDs for the live target portal — set for your portal instance
  studies_table_id: "syn52694652"
  files_table_id: "syn16858331"
  datasets_table_id: "syn16859580"
  # TF-IDF cosine similarity threshold for fuzzy title matching
  fuzzy_title_threshold: 0.85

synapse:
  # Folder where pending-review projects are created.
  # Set to a Synapse project/folder ID, or null to create top-level projects.
  pending_review_parent_id: null
  # Project name template: EXT_{Repository}_{AccessionID}
  project_name_template: "EXT_{repository}_{accession_id}"
  resource_status: "pendingReview"
  # Principal ID of the data manager team that receives curator permissions on new projects
  # Find this in Synapse: Teams → your data manager team → team ID in the URL
  team_id: "3378999"
  schema:
    # Prefix prepended to template names to form a Synapse JSON Schema URI
    # e.g. "org.synapse.nf-" + "scrnaseqtemplate" → "org.synapse.nf-scrnaseqtemplate"
    uri_prefix: "org.synapse.nf-"
    # GitHub API URL listing available schema templates as JSON files
    metadata_dictionary_url: "https://api.github.com/repos/nf-osi/nf-metadata-dictionary/contents/registered-json-schemas"

annotations:
  # Portal-controlled vocabulary for disease focus annotation.
  # Replace with valid values from your portal's annotation dictionary.
  disease_focus_values:
    - "Neurofibromatosis type 1"
    - "Neurofibromatosis type 2"
    - "Schwannomatosis"
    - "MPNST"
  # Portal-controlled vocabulary for disease manifestation annotation.
  manifestation_values:
    - "MPNST"
    - "Plexiform Neurofibroma"
    - "Low-Grade Glioma NOS"
    - "Behavioral"
    - "Cognition"
    - "Memory"
    - "Pain"

notifications:
  jira:
    enabled: true
    project_key: "NFOSI"
    issue_type: "Task"
    assignee_email: "nf-osi@sagebionetworks.org"
    # Summary template for new study tickets
    summary_template: "Review auto-discovered study: {study_name} ({repository}:{accession_id})"

connectors:
  pubmed_geo:
    enabled: true
  sra:
    enabled: true
  dbgap:
    enabled: true
  zenodo:
    enabled: true
  figshare:
    enabled: true
  osf:
    enabled: true
  arrayexpress:
    enabled: true
  ega:
    enabled: true
  pride:
    enabled: true
  metabolights:
    enabled: true
  pdc:
    enabled: true

logging:
  level: "INFO"
  json: true
