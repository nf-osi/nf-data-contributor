# NADIA Annotation Skill File
#
# Accumulated annotation patterns discovered via the Dream self-improvement loop.
# Each entry records a concrete rule, its source (fix command or positive confirmation),
# and the issue(s) that informed it. NADIA loads this file at run start (Step 1) to
# prime its annotation decisions before encountering new datasets.
#
# Format per entry:
#   pattern:   short name
#   rule:      the concrete, actionable rule
#   source:    "fix" (human correction) | "confirmed" (human approved without changes)
#   issues:    list of GitHub issue numbers that informed this rule
#   added:     ISO date this entry was created or last updated

patterns:

  - pattern: "ENA submitter is not the PI"
    rule: >
      The ENA/ArrayExpress submitter field reflects whoever deposited the files —
      often a postdoc or research engineer, not the principal investigator.
      Always derive the investigator/studyLeads field from the PubMed AuthorList
      (first + last/corresponding author). Only fall back to repository submitter
      if no PMID is available and BioStudies has no explicit PI role listed.
    source: fix
    issues: []
    added: "2026-04-16"

  - pattern: "libraryPreparationMethod must be verified from source"
    rule: >
      Do not infer libraryPreparationMethod from the assay type or paper title.
      '10x Chromium' does not imply any specific kit version. Check ENA sample
      attributes, BioStudies protocol section, or GEO GSM characteristics for the
      explicit kit/method name. If the kit version is not explicitly stated in any
      structured source (not even inferred from protocol context), set to 'Unknown'
      and flag in the curation comment — do not guess a version that isn't stated.
      Issue #29 confirmed: setting 'Chromium Single Cell 3' Reagent Kit v3' based
      on protocol inference (not an explicit metadata statement) was rejected by
      the data manager. Set to 'Unknown' and let a human confirm if needed.
    source: fix+confirmed
    issues: [29]
    updated: "2026-05-03"

  - pattern: "readPair enum is empty — do not set"
    rule: >
      The readPair field in the RNA-seq template has an empty enum list.
      An empty enum means no valid value exists in the current schema version.
      Do not set readPair at all — setting it will fail schema validation.
      This applies to any schema field where fetch_schema_properties() returns
      "enum": [] for that field.
    source: fix
    issues: []
    added: "2026-04-16"

  - pattern: "per-patient diagnosis often not in GEO metadata"
    rule: >
      For fields capturing individual-level diagnosis, genotype, or condition,
      GEO sample characteristics frequently omit this information or use
      placeholder values. When the study has multiple patient/sample groups,
      check PMC full-text supplementary tables (Tier 2) before declaring the
      field unresolvable. Supplementary Table 1 often contains per-patient
      diagnosis, age, sex, and sample IDs that map to GSM accessions.
    source: fix
    issues: []
    added: "2026-04-16"

  - pattern: "dissociationMethod NaN artifact"
    rule: >
      When dissociationMethod (or any field) is set to 'NaN', that is an
      artifact of pandas NaN serialization — not a valid enum value. The audit
      step must treat NaN/nan/None as missing, not as a set value. Any field
      with value NaN, nan, or the string 'None' must be cleared and re-derived
      from source metadata.
    source: fix
    issues: []
    added: "2026-04-16"

  - pattern: "resourceStatus must not appear on File entities"
    rule: >
      The resourceStatus / resource review status annotation belongs only on
      Project entities and Dataset entities. Never set it on individual File
      entities — doing so creates a spurious column in the portal Datasets tab.
      The audit step (Step 7) must explicitly scan and remove resourceStatus
      from all File entities.
    source: fix
    issues: []
    added: "2026-04-16"

  - pattern: "GEO RAW.tar contains unprocessed files"
    rule: >
      GEO supplementary archives named *_RAW.tar contain raw/unprocessed data
      files (e.g. raw FASTQ, raw count matrices). Do not skip these — extract
      and register them under the Raw Data folder. They are distinct from the
      processed matrix files in the main series files. Check for both
      *_RAW.tar (raw) and separate processed files in the GEO supplementary list.
    source: fix
    issues: []
    added: "2026-04-16"

  - pattern: "specimenID must be unique per file"
    rule: >
      specimenID (or whichever schema field captures the biological specimen
      identifier) must be a unique value per file — never copy a single shared
      value to all files. Map each file back to its SRR → SRX → GSM or
      BioSample accession. Use sample_title or sample_alias from ENA filereport,
      or the GSM identifier from GEO, not the SRR run accession itself.
    source: fix
    issues: []
    added: "2026-04-16"

  - pattern: "assay specificity: scRNA-seq vs RNA-seq"
    rule: >
      When source metadata contains library_source = 'TRANSCRIPTOMIC SINGLE CELL',
      library_strategy = 'scRNA-seq', or protocol mentions '10x Chromium',
      'Drop-seq', 'Smart-seq2 per-cell', 'inDrop', or 'Fluidigm C1':
      set assay to 'single-cell RNA-seq', NOT 'RNA-seq'. The publication title
      alone is not reliable — verify from ENA library metadata or GEO sample
      characteristics.
    source: fix
    issues: []
    added: "2026-04-16"

  - pattern: "elink ownership verification required"
    rule: >
      NCBI elink frequently returns GEO/SRA accessions from papers other than
      the one being processed. For every GEO accession from elink, call
      Entrez.esummary(db='gds', id=...) and verify that PubMedIds contains
      the PMID being processed. If it does not match, discard the accession —
      do not process it under the wrong paper. It will be discovered again when
      its actual paper is processed. This is not optional — incorrect elink
      attribution caused a proteomics dataset (GSE263107) to be grouped inside
      a methylation project it had no connection to, resulting in wrong schema
      binding and misattributed annotations.
    source: fix
    issues: [120]
    updated: "2026-04-26"

  - pattern: "germline disease scoping — somatic vs germline"
    rule: >
      Set disease annotations (NF1, NF2, schwannomatosis/SMARCB1, etc.) ONLY
      when the biospecimens come from a person (or model organism) with the
      germline condition. Somatic loss of a disease gene in a cancer cell line
      or tumor (e.g., NF1-depleted breast cancer line, TCGA tumor with NF1
      mutation, SMARCB1-deficient renal medullary carcinoma from a patient who
      does not have schwannomatosis) does NOT qualify — those are general cancer
      samples, not hereditary disease patients.
      To determine which applies: read the paper's patient/model description.
      Look for "NF1/NF2/schwannomatosis patients", "germline mutation",
      "Nf1+/- mouse" (heterozygous germline) vs "NF1 knockout in MCF-7".
      If uncertain, use the specific tumor/cancer type annotation and flag for
      human review. Never default to a hereditary disease annotation when the
      connection to that disease is only somatic.
    source: fix
    issues: [177, 244, 194]
    updated: "2026-04-19"

  - pattern: "studyLeads format: Firstname Lastname"
    rule: >
      The studyLeads field must use "Firstname Middlename/Initial Lastname"
      format — never "Lastname, Firstname" or "Lastname,F". PubMed AuthorList
      XML returns names as LastName + ForeName; always reformat as
      f"{fore_name} {last_name}". For middle initials: "Scott P Angus" not
      "Angus, Scott P" or "Angus SP".
      IMPORTANT — GEO contributor fields use "Lastname SP" abbreviated format
      (e.g. "Angus SP", "Mitchell DK"). Do NOT store these directly. Cross-
      reference with PubMed AuthorList to resolve the full name: look up the
      PMID from the GEO record, fetch AuthorList, and match the last name +
      initial. Only fall back to GEO contributor if there is no PMID and the
      full name cannot be resolved.
    source: fix
    issues: [9, 223, 186]
    updated: "2026-04-19"

  - pattern: "Dataset columns: id and name must be first"
    rule: >
      The first two columns of every Dataset entity must be the system columns
      `id` (ENTITYID type) and `name` (STRING type). When building columnIds:
      check the existing Dataset entity's columnIds for id and name column IDs
      first; create them if absent (POST /column with columnType ENTITYID and
      STRING respectively). Then add alphabetically sorted annotation columns.
      Final order: [id_col_id, name_col_id] + sorted_annotation_col_ids.
      The audit must also enforce this ordering when rebuilding columnIds.
      CRITICAL — never create a custom annotation called `name` on File or
      Dataset entities. The Synapse system `name` property IS the entity name
      column in Dataset views. If you add a custom `name` annotation, it
      appears as a separate annotation column with empty or duplicate values,
      making the Dataset view confusing and missing the real filename.
      Add 'name' to EXCLUDE_COLS alongside 'resourceStatus' and 'filename'.
      The audit auto-fix must detect and remove any custom 'name' annotation
      from all File entities (same pattern as the existing 'filename' removal).
    source: fix
    issues: [10, 11, 220, 223, 251]
    updated: "2026-04-26"

  - pattern: "Source Metadata folder must be populated"
    rule: >
      Every agent-created project has a Source Metadata/ folder. Do not leave
      it empty — either populate it with the original repository metadata files
      (GEO series matrix, ENA filereport TSV, Zenodo metadata JSON, etc.) or
      remove the folder entirely. An empty Source Metadata/ folder is confusing
      for data managers and fails the completion checklist. The audit must flag
      empty Source Metadata/ folders. See synapse_workflow.md for what to store.
    source: fix
    issues: [177, 220, 223, 186, 267]
    updated: "2026-04-26"

  - pattern: "Dataset names must be descriptive"
    rule: >
      Dataset entity names must be human-readable and informative — not just
      the repository accession. A good name communicates assay type, biological
      context, and (optionally) accession. Examples:
        GOOD: "GSE265782 RNA-seq — NF1+/- mouse sciatic nerve (bulk)"
        GOOD: "PXD012345 Proteomics — Schwannoma patient biopsies"
        BAD:  "GEO_GSE265782"
        BAD:  "RNA-seq dataset"
      The name should allow a data manager to distinguish datasets within a
      multi-dataset project without clicking into each one.
    source: fix
    issues: [11, 216, 220]
    added: "2026-04-16"

  - pattern: "Reject re-analysis, summary-only, and stub datasets"
    rule: >
      Do not create Synapse projects for:
      1. Re-analysis studies — papers that reprocess existing public GEO/SRA
         data without depositing new primary data. These add no new computable
         data. When rejecting a re-analysis paper, extract the original
         repository accessions mentioned in the paper's data availability
         statement and write them to `{WORKSPACE_DIR}/reanalysis_originals.json`
         as seeds for the next run (only if they are not already in the state
         table). Example format: [{"accession": "GSE12345", "source": "GEO",
         "from_pmid": "12345678"}].
      2. Summary-only datasets — repositories containing only summary statistics
         (aggregate counts, p-values, coefficient tables) without raw or
         processed primary data. These cannot be meaningfully mined.
      3. Stub datasets — repositories where the data is described but no actual
         files are deposited yet (OSF with zero files, embargoed datasets with
         no accessible files, placeholder records).
      Detection signals: paper says "we downloaded data from GEO/TCGA",
      repository has 0 files or only .txt summary tables, access_type=embargoed.
    source: fix
    issues: [194, 235, 233, 246]
    updated: "2026-04-19"

  - pattern: "GEO TAR archive must be inspected for additional file types"
    rule: >
      GEO series often deposit additional file types (IDAT, BED, bigWig, etc.)
      inside a supplementary TAR archive (e.g., GSE123456_RAW.tar). Do NOT
      declare a file type absent without checking the TAR contents. Call the
      GEO FTP listing for the accession (ftp://ftp.ncbi.nlm.nih.gov/geo/series/...)
      and list all supplementary files. If a *_RAW.tar or similar archive is
      present, note its likely contents (based on the assay type) and flag in
      the curation comment that the archive may contain additional file types
      requiring extraction.
    source: fix
    issues: [220, 223]
    added: "2026-04-16"

  - pattern: "sex/age/diagnosis absent from GEO metadata — try supplementary tables first"
    rule: >
      Fields like sex, age, diagnosis, genotype, and treatment condition are routinely
      absent from GEO sample characteristics and ENA BioSample attributes, but are
      frequently present somewhere in the paper — in the main text tables, in any
      supplementary table, or described in the results/methods sections.
      Do NOT flag these fields for human review without first:
        1. Calling fetch_geo_supplementary_files(gse) to list supplementary files
        2. Downloading each candidate file with try_download_and_parse_table(url)
        3. Calling find_sample_metadata_table(tables, sample_ids) to find the manifest
        4. Applying per-sample values from the matched rows
      "Not in GEO metadata" is not a stopping condition — it means "continue to
      supplementary tables". A curation comment that says "sex not in GEO metadata —
      needs human review" without having attempted the supplementary tables is an
      incomplete gap-fill, not a genuine gap.
      Issue #290 reinforced: NADIA placed a Sample_list.xlsx into Source Metadata
      during file enumeration but did NOT parse it before annotating. The data
      manager had to manually correct 71 files (tumorType and diagnosis) using the
      same xlsx. Rule: any depositor-provided sample manifest file stored in
      Source Metadata MUST be parsed at gap-fill time, before declaring per-sample
      fields unresolvable. See "depositor-manifest-must-be-parsed-not-just-stored".
    source: fix
    issues: [123, 290]
    updated: "2026-05-24"

  - pattern: "Wiki must include Auto-curated attribution and disclaimer"
    rule: >
      The wiki footer line must read:
        *This project was auto-curated by [NADIA](https://github.com/nf-osi/nadia)
        on {today} and is pending data manager review.*
      Use "auto-curated by NADIA" (not "ingested automatically by @nadia-bot").
      The wiki title must be the full publication title — never "Auto-Discovered"
      or generic placeholders.
      The portal's standard wiki template also requires a disclaimer section that
      NADIA's auto-generated wiki has been missing (Issues #267, #251). Until the
      exact disclaimer text is confirmed by DCC (flagged for human review in the PR),
      flag wikis as "disclaimer section needed" in the GitHub curation comment. Do
      NOT generate wiki content that differs structurally from the template in
      prompts/synapse_workflow.md — use exactly that function's output.
    source: fix
    issues: [216, 267, 251]
    updated: "2026-04-26"

  - pattern: "nf1Genotype for knockdown vs knockout"
    rule: >
      The nf1Genotype field reflects the actual DNA genotype, not the functional
      perturbation level:
      - siRNA / shRNA / RNAi knockdown: DNA sequence is unchanged → nf1Genotype = '+/+'
        (even though NF1 protein/mRNA is reduced, both alleles are still present)
      - CRISPR knockout: typically biallelic frameshift → nf1Genotype = '-/-'
        (CRISPR almost always creates true null alleles in both copies)
      - Heterozygous CRISPR or germline Nf1+/- model: nf1Genotype = '+/-'
      - Wild-type controls in any experiment: nf1Genotype = '+/+'
      Set the value from BioSample genotype attribute; if the genotype field says
      'NF1KO' or 'NF1 knockout' without specifying zygosity, default to '-/-'.
    source: fix
    issues: [226]
    added: "2026-04-16"

  - pattern: "full text fallback: Unpaywall → Semantic Scholar when not in PMC"
    rule: >
      When fetching paper methods text for Tier 2 / Tier 3 gap-fill:
      always use fetch_paper_methods_text(pmid, doi, email) — not fetch_pmc_methods().
      The wrapper tries three sources in order:
        1. PMC full-text XML (free, structured, best quality)
        2. Unpaywall OA PDF (get_unpaywall_oa_url(doi, email) → download → extract text)
        3. Semantic Scholar abstract + tldr (get_semantic_scholar_tldr(doi))
      Most subscription papers have an OA version indexed by Unpaywall (preprint, author
      manuscript, gold OA). Roughly 50–60% of biomedical papers that are NOT in PMC still
      have an Unpaywall OA location. Only after all three sources fail should a paper be
      declared programmatically inaccessible — at which point, flag with the specific reason
      (e.g., "Elsevier user license — HTTP 403" or "subscription only").
      Do NOT stop at "not in PMC" and declare the paper inaccessible.
    source: fix
    issues: []
    added: "2026-04-16"

  - pattern: "figshare-per-doi-grouping"
    rule: >
      When Figshare secondary discovery returns multiple articles (each with its
      own Figshare article ID) that share the same publication DOI (found in the
      article's `resource_doi` or `references` fields), they represent individual
      supplementary data files for ONE paper — do NOT create a separate Synapse
      project per Figshare article. Instead, group all articles sharing the same
      publication DOI into a single publication group, each as a separate Dataset
      within one project.
      Implementation: after fetching Figshare results, group by `resource_doi`.
      Articles with no `resource_doi` but the same title prefix may also belong
      together — check `related_identifiers` for a shared paper DOI.
    source: fix
    issues: [203, 204, 205, 206, 207]
    added: "2026-04-19"

  - pattern: "c57bl6-substrain-precision"
    rule: >
      Only use the substrain "C57BL/6J" if the paper or repository metadata
      explicitly states "C57BL/6J". If the paper says "C57BL/6" without a
      substrain qualifier, use "C57BL/6" — do not add the J substrain. C57BL/6J
      refers to a specific Jackson Laboratory colony; using it when unspecified
      is inaccurate and misleads downstream data consumers comparing across studies.
    source: fix
    issues: [125]
    added: "2026-04-19"

  - pattern: "zero-file-annotations-blocks-completion"
    rule: >
      If ANY file entity in a project has zero annotations after Phase 2 gap-fill,
      the project must NOT be logged as `synapse_created` in the state table.
      Instead, log it as `error` with the note "zero_annotation_files". Projects
      with zero-annotation files are unacceptable for human review and will always
      be sent back for rework.
      The audit (Step 7a) must detect zero-annotation files and mark them as
      BLOCKING rather than "HIGH PRIORITY for Phase 2". If Phase 2 completes
      without annotating these files, log the project as error and move on.
    source: fix
    issues: [251, 184, 28, 35]
    updated: "2026-05-03"

  - pattern: "assay-schema-mismatch-is-blocking"
    rule: >
      If the schema template bound to a files folder does not match the actual
      assay type of the files (e.g., an RNA-seq template bound to WGS files, or
      a bulk-sequencing template bound to single-cell data), flag this as a
      BLOCKING error in the audit. Do not log the project as `synapse_created`
      until the correct schema is selected and bound.
      Detection: compare the `assay` annotation on the files against the schema
      URI. If the schema name contains "rna" but files have assay="Whole Genome
      Sequencing", or schema contains "chip" but assay="RNA-seq", that is a
      mismatch. The audit must rebind the correct schema and re-run validation
      before clearing the block.
    source: fix
    issues: [168, 242]
    added: "2026-04-19"

  - pattern: "ntap-study-integration-check"
    rule: >
      When a study's PubMed GrantList or fundingAgency annotation contains "NTAP"
      (Neurofibromatosis Therapeutic Acceleration Program), the new data may belong
      inside an existing portal NTAP project rather than as a standalone new project.
      Before classifying such a study as NEW, query the portal studies table for any
      study with fundingAgency matching 'NTAP' and similar diseaseFocus. If potential
      matches exist, flag the study in the GitHub issue with a note: "NTAP-funded
      study — may require integration into an existing NTAP project. Data manager
      review required before provisioning." Do NOT automatically create a new project
      when this flag is set; instead, log as `discovered` in the state table and wait
      for data manager guidance. A data manager who creates a study without this check
      will have to manually move folders across Synapse projects — an expensive fix.
    source: fix
    issues: [251]
    added: "2026-04-26"

  - pattern: "amplicon-library-strategy-vocabulary-gap"
    rule: >
      When ENA/SRA metadata shows library_strategy = AMPLICON (with or without
      library_source = GENOMIC), the assay is typically a functional genetic screen
      (shRNA library screen, CRISPR screen, or barcode-counting screen) that uses
      amplicon sequencing as its readout. No specific enum value exists for this
      assay type in the current portal schema (e.g. bulksequencingassaytemplate).
      Correct handling:
        1. Set assay to the closest available enum value — typically
           "next-generation sequencing"
        2. Flag as a vocabulary gap in the GitHub curation comment:
           "Assay is functional genetic screen (ENA library_strategy=AMPLICON).
            No specific enum exists — used 'next-generation sequencing' as
            closest. DCC vocabulary extension requested."
        3. Do NOT use "RNA-seq", "WGS", or other specific assay names that
           imply a different library type.
    source: fix
    issues: [35]
    added: "2026-04-26"

  - pattern: "variant-classification-disease-focus"
    rule: >
      When a study's PURPOSE is to functionally characterize variants of a
      disease gene for clinical interpretation in the disease population
      (e.g., VUS reclassification, saturation mutagenesis, base-editing variant
      scans, MAVE / deep mutational scanning of NF1/NF2/SMARCB1/LZTR1), set
      diseaseFocus to the corresponding disease (NF1, NF2, schwannomatosis)
      EVEN IF the experimental system is a cancer cell line or non-disease
      cell type. The cell line is a tool; the study OUTPUT (per-variant
      functional scores for clinical interpretation) is for the disease patient
      community.
      This is the deliberate exception to the germline-vs-somatic rule
      (CLAUDE.md Standard 13). Apply it only when the study explicitly aims to
      produce variant interpretation for the disease — NOT when the disease
      gene happens to be one of many drivers in a general cancer screen, and
      NOT when the cell line incidentally carries somatic loss of the disease
      gene without it being the study's focus.
      Detection signals: paper title or abstract uses phrases like
      "variant classification", "VUS reclassification", "functional impact of
      variants", "saturation genome editing", "base editing screen of <gene>",
      "deep mutational scanning of <gene>". The targeted gene is the disease
      gene, not an unrelated cancer driver.
      Always flag in the GitHub curation comment so the data manager can
      confirm the decision matches portal scope (note: "Disease focus chosen
      because study purpose is functional variant classification for <disease>,
      despite cancer cell line system. Confirm portal scope.").
    source: fix
    issues: [292]
    added: "2026-05-10"

  - pattern: "processed-only-deposit-tier4-primary"
    rule: >
      When a Synapse project's only files are processed data (h5ad, loom,
      Seurat .rds, processed count matrices, MTX bundles) with NO associated
      raw FASTQ/BAM and NO linked SRA/GEO accession, Tier 1 structured
      metadata sources yield nothing for per-sample biological fields. In
      this case, Tier 4 file inspection (h5ad obs table, count matrix headers,
      loom col_attrs) becomes the PRIMARY source for per-cell/per-sample
      genotype, perturbation identity, cell type, condition, and sample IDs —
      not the last resort.
      For processed-only single-cell deposits, you MUST:
        1. Download the h5ad/loom file (or use HTTP Range requests for the
           HDF5 obs block on large files)
        2. Call inspect_h5ad_obs(local_path) to enumerate obs column names
        3. Read each relevant obs column for per-cell values
        4. Validate obs categories against schema enums via
           validate_against_enum()
        5. Apply per-sample values to the h5ad File entity's annotations
      "Tier 4 not performed" is NOT an acceptable gap-fill outcome when the
      deposit is processed-only. The audit must flag projects where the only
      file is an h5ad/loom/rds and Tier 4 inspection was skipped — this is a
      blocking issue, not a "human review" item.
      Detection signal: the project's Raw Data folder contains only files
      with extensions .h5ad, .loom, .rds, .h5, .anndata, or .mtx, and the
      gap_fill_report shows zero filled_tier4 entries.
    source: fix
    issues: [292]
    added: "2026-05-10"

  - pattern: "dataset-version-phase3-only"
    rule: >
      Phase 3 (apply_audit_fixes.py) is the ONLY step that mints stable Dataset
      snapshot versions. Phase 1 (audit.py) must NOT mint versions during a normal
      run — it runs before Phase 3 applies annotation fixes, so any v1 snapshot
      minted in Phase 1 will point to pre-annotation file versions and show blank
      columns in the portal Datasets tab.
      Root cause of Issue #27: Phase 1 minted v1 with unannotated file references;
      Phase 3 then tried to mint another v1 but failed silently (label conflict),
      leaving the bad v1 as the only stable snapshot.
      Two required fixes in Phase 3 code:
        1. Before minting, query GET /entity/{id}/version to get existing labels.
           Use the next available label: v1, v2, v3... (never hardcode 'v1').
        2. Always sync Dataset items to the latest file versionNumbers BEFORE
           minting, so the snapshot reflects the post-annotation file state.
      In Phase 1: replace the minting block with a check-only block that logs a
      warning "Dataset has no stable snapshot — Phase 3 will mint" if missing.
    source: fix
    issues: [27]
    added: "2026-05-03"

  - pattern: "specimenType-cell-line-not-tissue-origin"
    rule: >
      When a study uses in vitro cell cultures (immortalized cell lines, primary
      cultures, or otherwise), set specimenType (or whichever schema field captures
      specimen type) to 'cell line' — NOT the anatomical tissue of origin. A Schwann
      cell line or any other immortalized line is a cell line regardless of the
      tissue it derived from. Setting it to 'nerve tissue', 'bone marrow', or any
      anatomical tissue type is wrong when the samples are cultured cells.
      How to determine: read GEO GSM sample type attribute or BioSample `sample type`
      field. Look for "cell line" in the characteristics. If the paper's Materials and
      Methods describes an immortalized cell line or primary culture, specimenType =
      'cell line'. Only use an anatomical tissue type when the sample is a direct
      biopsy, surgical resection, or organism-derived tissue without in vitro culture.
    source: fix+confirmed
    issues: [35]
    added: "2026-05-03"

  - pattern: "accessions-verify-generated-not-reused"
    rule: >
      Before associating a dataset accession with a paper's Synapse project, verify
      the paper GENERATED that specific data deposit — not merely cited, analyzed, or
      reused it. A paper's Methods section frequently mentions existing public datasets
      that were downloaded and reanalyzed alongside newly generated data. CrossRef
      relations and Europe PMC annotations return ALL accession mentions including
      reused ones.
      Signals that data was reused, not generated:
        - Repository deposit date predates the paper's submission date by more than
          a few weeks (papers typically deposit concurrent with submission)
        - The accession's GEO/ENA record lists a different primary PMID
        - The paper says "we downloaded data from GEO/TCGA/SRA" for that accession
        - The repository abstract cites a different publication as the primary study
      Action when reuse is detected:
        - Exclude the accession from the current project
        - Write the accession to reanalysis_originals.json as a seed candidate
        - If the original study isn't already in the portal, it will be picked up on
          the next run
      The same paper can have both generated and reused accessions — split them
      correctly. Only the generated accessions belong in the new project.
    source: fix
    issues: [23]
    added: "2026-05-03"

  - pattern: "depositor-manifest-must-be-parsed-not-just-stored"
    rule: >
      A depositor-provided sample manifest file (Sample_list.xlsx, sample_metadata.csv,
      clinical_data.xlsx, samplesheet.tsv, etc.) is GROUND TRUTH for per-sample
      diagnosis, tumorType, sex, age, genotype, and tissue source. Copying the
      manifest into the Source Metadata/ folder is NOT enough — the manifest MUST
      be parsed and its per-sample values applied to the corresponding File entities
      before the project is logged as `synapse_created`.
      Audit Phase 1 must add this blocking check: if Source Metadata/ contains any
      file whose name matches a manifest pattern (sample, metadata, manifest,
      clinical, samplesheet, sample_list, sample_info, with .xlsx/.csv/.tsv/.xls
      extension) AND files in the dataset have placeholder values like 'Not
      Applicable', 'Unknown', or repeated identical values across multi-group
      studies for biological fields → flag as `unparsed_depositor_manifest`
      BLOCKING error. Phase 2 must download, parse, and apply the manifest's
      per-sample values before the block can clear.
      Issue #290 root cause: NADIA stored Sample_list.xlsx in Source Metadata
      during initial file enumeration but skipped parsing it during gap-fill,
      leaving all 71 specimens with `diagnosis='Not Applicable'` and wrong
      tumorTypes (Neurofibroma instead of Hybrid PNST, etc.). The data manager
      had to manually re-annotate.
    source: fix
    issues: [290]
    added: "2026-05-24"

  - pattern: "dbgap-link-to-existing-project-via-sra-runs"
    rule: >
      When a data manager requests that dbGaP study indexes be linked to an
      existing Synapse project (typically pattern: "link phs* indexes to syn*
      following the same pattern as <reference EGA project>"), do NOT create a
      new project. Instead, add per-run file entities under the existing
      project's Raw Data folder using the same pattern as the EGA reference
      project (syn32128792). Implementation:
        1. Enumerate SRA runs from the linked SRA study accession (e.g., SRP*)
           via ENA filereport API — request all available columns for accessible
           runs; use NCBI Entrez efetch on the SRA database with the phs*
           accession as search term for dbGaP-restricted runs not in ENA.
        2. For each SRR, create a File entity with ExternalFileHandle pointing
           to the dbGaP study page:
             https://www.ncbi.nlm.nih.gov/projects/gap/cgi-bin/study.cgi?study_id={phs_id}
           Name each file after the SRR accession (e.g., SRR32270189).
        3. Fetch dbGaP phenotype indexes (pht* files) from the dbGaP FTP for
           per-subject DIAGNOSIS, SEX, AGE, NF1/NF2_STATUS, and per-sample
           HISTOLOGICAL_TYPE, BODY_SITE, IS_TUMOR, ANALYTE_TYPE. Map sample
           accessions to subjects, then apply per-file values.
        4. Set per-file: assay (from library_strategy), individualID (from
           sample_alias), specimenID (from sample_title), sex, tumorType,
           diagnosis, organ/tissue (from BODY_SITE), accessType='Controlled
           Access'.
        5. Create a Dataset entity as a direct child of the project named like
           "dbGaP Raw Data (requires approval on dbGaP)". Set Dataset
           annotations: contentType=dataset, externalAccessionID=phs* (plus the
           linked SRP* and PRJNA* accessions as a list), externalRepository=dbGaP
           (plus SRA, BioProject), accessType='Controlled Access', and add a
           `conditionsOfAccess` annotation:
             "Data must be requested and accessed through dbGaP, study {phs_id}."
        6. Bind appropriate schema(s) (e.g., genomicsassaytemplate for WXS,
           rnaseqtemplate for RNA-seq) to the files folder.
        7. Update the project wiki with a dbGaP access notice (parallel to the
           EGA notice in syn32128792):
             "**PLEASE NOTE:** This project links to data stored in dbGaP,
             annotated with the NF-OSI metadata dictionary to make this dataset
             visible in the NF Data Portal. The data itself _is not available_
             on Synapse or the NF Data Portal. You must request permission and
             access the data on [dbGaP]({study_url})."
        8. Mint stable v1 snapshot on the dataset.
      Before starting: verify the NADIA service account has admin permissions
      on the target project — if it doesn't, the run will fail and the request
      must be re-routed (Issue #299 root cause).
    source: fix
    issues: [299]
    added: "2026-05-24"

  - pattern: "isprimarycell-no-for-cell-lines"
    rule: >
      When the schema defines an `isPrimaryCell` field and the sample is an
      immortalized cell line (specimenType='cell line' OR isCellLine='Yes'),
      set `isPrimaryCell='No'`. Immortalized cell lines are by definition NOT
      primary cells — they have been transformed or stably propagated beyond
      primary culture. This applies to ST8814, MCF-7, HEK293, all NF1-null
      Schwann cell lines, MPNST cell lines, etc.
      Conversely, if the sample is a primary culture (not yet immortalized)
      directly isolated from tissue and used within a few passages, set
      `isPrimaryCell='Yes'`.
      Audit Phase 1 must check: any File entity with specimenType='cell line'
      or isCellLine='Yes' and no `isPrimaryCell` annotation → auto-fix by
      setting `isPrimaryCell='No'`. This was a recurring post-approval fix
      (Issue #156) and is fully derivable without reasoning.
    source: fix+confirmed
    issues: [156]
    added: "2026-05-24"

  - pattern: "nf-cohort-default-disease-for-tumors-without-explicit-statement"
    rule: >
      When the study is an NF-focused cohort (paper title/abstract describes
      "NF1 patients", "NF2 patients", "schwannomatosis patients", "NF cohort",
      or similar), specimens that are NF-associated tumor types should be
      annotated with the corresponding disease as `diagnosis` even when the
      per-sample germline status is not explicitly stated in the manifest:
        - MPNST in NF1 cohort → diagnosis='Neurofibromatosis type 1'
        - Plexiform neurofibroma in NF1 cohort → diagnosis='Neurofibromatosis type 1'
        - Hybrid PNST in NF1 cohort → diagnosis='Neurofibromatosis type 1'
          (HPNSTs are predominantly NF1-associated)
        - Schwannoma in NF2 cohort → diagnosis='Neurofibromatosis type 2'
          (or 'NF2-related schwannomatosis')
        - Schwannoma in schwannomatosis cohort → diagnosis='schwannomatosis'
      EXCEPTIONS that must remain `Not Applicable` or get a non-NF disease:
        - Synovial sarcoma or other sporadic sarcomas mixed in the cohort
          (per Issue #290, R1_3 was Synovial Sarcoma and correctly remained NA)
        - Healthy donor controls
        - Cancer types not associated with the NF syndrome (e.g., pancreatic
          ductal adenocarcinoma in an NF1 cohort study — these would be NA)
      Always flag this default-assignment decision in the GitHub curation
      comment so the data manager can confirm if patient-level germline status
      is available in records they have access to.
      This extends Standard 22 (which covered benign tumors) to malignant
      tumors in NF cohort studies.
    source: fix
    issues: [290]
    added: "2026-05-24"

  - pattern: "spatial-transcriptomics-one-dataset-confirmed"
    rule: >
      Standard 15 (one Dataset entity for spatial transcriptomics bundles)
      confirmed by Issue #290: NADIA initially created two Dataset entities
      (imaging + sequencing) for the same Zenodo record. The data manager
      merged them into a single Dataset (syn74276744 with 82 files), kept the
      imaging folder and sequencing folder with their separate schemas bound,
      and minted a single stable v6 snapshot.
      Reinforcement: when a single Zenodo/Figshare/Dryad record contains BOTH
      imaging files (e.g., .tif, .czi, .ome.tif) AND sequencing files (e.g.,
      .fastq, .h5, count matrices), they are one logical spatial transcriptomics
      dataset. Create:
        - ONE Dataset entity as direct child of the project
        - TWO files folders inside Raw Data (one for imaging, one for sequencing)
        - Different schema bound to each folder (imaging template + sequencing template)
        - Dataset items = union of all file IDs from both folders
        - Dataset columnIds = union of annotation columns from both file sets
      Audit Phase 1 must check: if a single repository accession produced
      multiple Dataset entities, and the file folders contain mixed imaging
      and sequencing files, flag as a spatial-transcriptomics-split error.
    source: fix+confirmed
    issues: [290]
    added: "2026-05-24"

  - pattern: "fileformat-zip-fallback-to-content-type"
    rule: >
      When the deposited file is a zip archive containing data files in a known
      format (DICOM, FASTQ, TIFF, etc.) and the schema's fileFormat enum does
      NOT include 'zip', set fileFormat to the INNER content type (e.g., 'DICOM'
      for a zip of DICOM files) and document the zip wrapper in the curation
      comment with a vocabulary-gap flag for 'zip'.
      Detection signals:
        - Filename ends in .zip
        - Repository description references the archived content type
        - For TCIA collections: zip archives wrap DICOM series
      Issue #80 confirmed this approach (fileFormat=DICOM for crossmoda_training.zip).
      Flag pattern: "fileFormat=zip vocabulary gap — files are zip archives
      containing {content_type}. Annotated as {content_type} per inner content."
    source: confirmed
    issues: [80]
    added: "2026-05-24"
